<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Futures Scalp Pro • ATR Dynamic</title>
  <style>
    :root {
      --bg: #0a0e17;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --green: #10b981;
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #eab308;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 0.94rem;
      line-height: 1.4;
    }

    header {
      padding: 14px 16px;
      background: var(--card);
      text-align: center;
      border-bottom: 1px solid #1f2937;
    }

    h1 {
      margin: 0;
      font-size: 1.42rem;
      font-weight: 600;
    }

    #status {
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      flex-wrap: wrap;
      justify-content: center;
      background: var(--card);
      border-bottom: 1px solid #1f2937;
    }

    input, button, select {
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      background: #1f2937;
      border: 1px solid #374151;
      color: white;
    }

    select { cursor: pointer; }

    button {
      background: var(--blue);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover { opacity: 0.92; }

    .market-trends {
      padding: 12px 16px;
      background: var(--card);
      margin: 12px;
      border-radius: 8px;
    }

    .trend-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #1f2937;
    }

    .news-section {
      padding: 12px 16px;
      background: var(--card);
      margin: 12px;
      border-radius: 8px;
    }

    .news-item {
      padding: 10px;
      border-bottom: 1px solid #1f2937;
    }

    .news-item a {
      color: var(--blue);
      text-decoration: none;
    }

    .news-item a:hover { text-decoration: underline; }

    .table-container {
      padding: 0 12px 24px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      font-size: 0.88rem;
    }

    th, td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #1f2937;
    }

    th {
      background: #0f172a;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.76rem;
    }

    td:first-child {
      text-align: left;
      font-weight: 500;
    }

    tr:hover {
      background: rgba(59, 130, 246, 0.07);
    }

    .coin-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .coin-cell img {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #1f2937;
    }

    .strong-buy { background: rgba(16,185,129,0.11); color: var(--green); font-weight: 600; }
    .buy       { color: var(--green); font-weight: 600; }
    .sell      { color: var(--red);   font-weight: 600; }
    .strong-sell { background: rgba(239,68,68,0.11); color: var(--red); font-weight: 600; }

    .rr-good   { color: #6ee7b7; }
    .rr-excellent { color: #34d399; font-weight: 600; }
    .rr-warning { color: #fbbf24; }

    .sentiment-bullish { color: var(--green); }
    .sentiment-bearish { color: var(--red); }
    .sentiment-neutral { color: var(--muted); }

    @media (max-width: 768px) {
      .controls { flex-direction: column; align-items: stretch; }
      th, td { padding: 9px 8px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Futures Scalp Pro • ATR Dynamic TP/SL</h1>
  <div id="status">Loading signals...</div>
</header>

<div class="controls">
  <select id="exchange">
    <option value="binance">Binance Futures</option>
    <option value="bybit">Bybit</option>
    <option value="okx">OKX</option>
  </select>
  <input type="text" id="search" placeholder="Search symbol (e.g. BTCUSDT)…">
  <button id="refresh">↻ Refresh</button>
</div>

<div class="market-trends">
  <h2 style="font-size:1.1rem; margin:0 0 8px;">Market Overview</h2>
  <div id="trends"></div>
</div>

<div class="table-container">
  <table id="table">
    <thead>
      <tr>
        <th>Symbol</th>
        <th>Price</th>
        <th>1h %</th>
        <th>Vol 24h</th>
        <th>RSI</th>
        <th>ATR</th>
        <th>Signal</th>
        <th>Entry</th>
        <th>TP1</th>
        <th>TP2</th>
        <th>SL</th>
        <th>R:R</th>
        <th>Sentiment</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="news-section">
  <h2 style="font-size:1.1rem; margin:0 0 8px;">Latest News</h2>
  <div id="news"></div>
</div>

<script>
const EXCHANGES = {
  binance: {
    tickerUrl: 'https://fapi.binance.com/fapi/v1/ticker/24hr',
    klinesUrl: sym => `https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=1m&limit=60`,
    parse: t => ({
      symbol: t.symbol,
      price: parseFloat(t.lastPrice),
      ch1h: parseFloat(t.priceChangePercent)/24 || 0,
      ch24: parseFloat(t.priceChangePercent) || 0,
      volume: parseFloat(t.quoteVolume) || 0,
      image: `https://bin.bnbstatic.com/images/coin/${t.symbol.replace('USDT','').toLowerCase()}.png` || 'https://via.placeholder.com/22'
    }),
    filter: t => t.symbol.endsWith('USDT') && !t.symbol.includes('_')
  },
  bybit: {
    tickerUrl: 'https://api.bybit.com/v5/market/tickers?category=linear',
    klinesUrl: sym => `https://api.bybit.com/v5/market/kline?category=linear&symbol=${sym}&interval=1&limit=60`,
    parse: t => ({
      symbol: t.symbol,
      price: parseFloat(t.lastPrice),
      ch1h: parseFloat(t.price1hPcnt || 0),
      ch24: parseFloat(t.price24hPcnt || 0),
      volume: parseFloat(t.volume24h || 0),
      image: 'https://via.placeholder.com/22'
    }),
    filter: () => true
  },
  okx: {
    tickerUrl: 'https://www.okx.com/api/v5/market/tickers?instType=SWAP',
    klinesUrl: sym => `https://www.okx.com/api/v5/market/candles?instId=${sym}&bar=1m&limit=60`,
    parse: t => ({
      symbol: t.instId.replace('-',''),
      price: parseFloat(t.last),
      ch1h: parseFloat(t.c24h)/24 || 0,
      ch24: parseFloat(t.c24h || 0),
      volume: parseFloat(t.volCcy24h || 0),
      image: 'https://via.placeholder.com/22'
    }),
    filter: t => t.instId.endsWith('-USDT-SWAP')
  }
};

const REFRESH_SEC = 30;
const NEWS_API = 'https://api.coingecko.com/api/v3/news';
const FNG_API = 'https://api.alternative.me/fng/?limit=1';

function calculateRSI(closes, period = 14) {
  if (closes.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let avgG = gains / period;
  let avgL = losses / period || 0.0001;
  return 100 - (100 / (1 + avgG/avgL));
}

function calculateMACD(closes) {
  function ema(arr, p) {
    const k = 2 / (p + 1);
    let em = arr[0];
    for (let i = 1; i < arr.length; i++) em = arr[i] * k + em * (1 - k);
    return em;
  }
  const ema12 = ema(closes.slice(-26), 12);
  const ema26 = ema(closes.slice(-26), 26);
  return ema12 - ema26;
}

function calculateATR(klines, period = 14) {
  if (klines.length < period + 1) return 0;
  let trs = [];
  for (let i = 1; i < klines.length; i++) {
    const h = klines[i][2], l = klines[i][3], pc = klines[i-1][4];
    trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
  }
  return trs.slice(-period).reduce((a,b)=>a+b,0) / period;
}

async function loadFNG() {
  try {
    const r = await fetch(FNG_API);
    const d = await r.json();
    const f = d.data[0];
    document.getElementById('trends').innerHTML = `
      <div class="trend-item"><span>Fear & Greed</span><span style="color:${f.value<40?'var(--red)':f.value>60?'var(--green)':'var(--yellow)'}">${f.value} (${f.value_classification})</span></div>
      <div class="trend-item"><span>Trend</span><span>${f.value>60?'Uptrend':f.value<40?'Downtrend':'Neutral'}</span></div>
    `;
  } catch {}
}

async function loadNews() {
  try {
    const r = await fetch(NEWS_API);
    const d = await r.json();
    const nd = document.getElementById('news');
    nd.innerHTML = '';
    d.data.slice(0,5).forEach(n => {
      const div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML = `<a href="${n.url}" target="_blank">${n.title}</a><p style="font-size:0.8rem;color:var(--muted);margin:4px 0;">${n.description?.slice(0,100)||''}...</p>`;
      nd.appendChild(div);
    });
  } catch {}
}

async function loadData() {
  const ex = document.getElementById('exchange').value;
  const cfg = EXCHANGES[ex];
  const status = document.getElementById('status');
  status.textContent = `Loading ${ex} futures (${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})})…`;

  loadFNG();
  loadNews();

  try {
    const r = await fetch(cfg.tickerUrl);
    if (!r.ok) throw new Error();
    const data = await r.json();
    let tickers = (data.result || data.data || data).filter(cfg.filter || (()=>true));

    tickers.sort((a,b) => cfg.parse(b).volume - cfg.parse(a).volume);
    const top = tickers.slice(0,50);

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    for (const t of top) {
      const item = cfg.parse(t);
      const kr = await fetch(cfg.klinesUrl(item.symbol));
      const kd = await kr.json();
      const klines = (kd.result || kd.data || kd).map(k => [k[0],parseFloat(k[1]),parseFloat(k[2]),parseFloat(k[3]),parseFloat(k[4])]);

      const closes = klines.map(k=>k[4]);
      const rsi = calculateRSI(closes);
      const macd = calculateMACD(closes);
      const atr = calculateATR(klines);
      const ch5m = closes.length >=6 ? (closes[closes.length-1] - closes[closes.length-6]) / closes[closes.length-6] * 100 : 0;

      let signal = 'NEUTRAL', cls = '';
      if (ch5m > 0.35 && rsi < 68 && macd > 0 && item.volume > 8e7) {
        signal = 'STRONG BUY'; cls = 'strong-buy';
      } else if (ch5m > 0.18 && rsi < 62 && macd > 0) {
        signal = 'BUY'; cls = 'buy';
      } else if (ch5m < -0.35 && rsi > 32 && macd < 0) {
        signal = 'STRONG SELL'; cls = 'strong-sell';
      } else if (ch5m < -0.18 && rsi > 38 && macd < 0) {
        signal = 'SELL'; cls = 'sell';
      }

      if (signal === 'NEUTRAL') continue;

      const entry = item.price;
      const isLong = signal.includes('BUY');
      const atrSL = 1.6 * atr;
      const atrTP1 = 2.2 * atr;
      const atrTP2 = 4.2 * atr;

      let sl, tp1, tp2;
      if (isLong) {
        sl  = entry - atrSL;
        tp1 = entry + atrTP1;
        tp2 = entry + atrTP2;
      } else {
        sl  = entry + atrSL;
        tp1 = entry - atrTP1;
        tp2 = entry - atrTP2;
      }

      const risk = Math.abs(entry - sl);
      const reward = Math.abs(tp2 - entry);
      const rr = risk > 0 ? reward / risk : 0;

      let rrCls = 'rr-good', rrTxt = rr.toFixed(1);
      if (rr >= 2.6) rrCls = 'rr-excellent';
      else if (rr < 1.6) rrCls = 'rr-warning';

      const sentCls = (ch5m > 0.2 && rsi < 70 && macd > 0) ? 'sentiment-bullish' :
                      (ch5m < -0.2 && rsi > 30 && macd < 0) ? 'sentiment-bearish' : 'sentiment-neutral';
      const sentTxt = sentCls.includes('bullish') ? 'Bullish' : sentCls.includes('bearish') ? 'Bearish' : 'Neutral';

      const tr = document.createElement('tr');
      tr.className = cls;
      tr.innerHTML = `
        <td class="coin-cell">
          <img src="${item.image}" alt onerror="this.src='https://via.placeholder.com/22'" loading="lazy">
          <div>${item.symbol}</div>
        </td>
        <td>$${item.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:6})}</td>
        <td>${item.ch1h.toFixed(2)}%</td>
        <td>$${Math.round(item.volume/1e6)}M</td>
        <td>${rsi.toFixed(1)}</td>
        <td>${atr.toFixed(4)}</td>
        <td class="${cls}">${signal}</td>
        <td>$${entry.toFixed(4)}</td>
        <td class="rr-good">$${tp1.toFixed(4)}</td>
        <td class="rr-excellent">$${tp2.toFixed(4)}</td>
        <td style="color:var(--red);">$${sl.toFixed(4)}</td>
        <td class="${rrCls}">${rrTxt}:1</td>
        <td class="${sentCls}">${sentTxt}</td>
      `;
      tbody.appendChild(tr);
    }

    status.textContent = `${ex.toUpperCase()} • ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} • refresh ${REFRESH_SEC}s`;
  } catch (e) {
    status.textContent = 'Error loading data – try refresh';
    console.error(e);
  }
}

document.getElementById('exchange').onchange = loadData;
document.getElementById('refresh').onclick = loadData;
document.getElementById('search').oninput = e => {
  const term = e.target.value.trim().toLowerCase();
  document.querySelectorAll('#tbody tr').forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
};

window.onload = loadData;
setInterval(loadData, REFRESH_SEC * 1000);
</script>
</body>
</html>
